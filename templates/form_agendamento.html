{% extends 'base.html' %}
{% block title %}Novo Agendamento{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Novo Agendamento</h2>
  <a href="{{ url_for('agendamentos') }}" class="btn-sec">← Voltar</a>
</div>

<form method="post" class="form-card">
  <div class="field">
    <label>Cliente</label>
    <select name="cliente_id" required>
      <option value="">Selecione...</option>
      {% for c in clientes %}
      <option value="{{ c.id }}">{{ c.nome }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="field">
    <label>Serviço</label>
    <select name="servico_id" required>
      <option value="">Selecione...</option>
      {% for s in servicos %}
      <option value="{{ s.id }}">{{ s.nome }} — R$ {{ "%.2f"|format(s.preco) }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="row2">
    <div class="field">
      <label>Data</label>
      <input type="date" name="data" required>
    </div>
    <div class="field">
      <label>Hora</label>
      <input type="time" name="hora" required>
    </div>
  </div>
  <div class="field">
    <label>Observação (opcional)</label>
    <input type="text" name="observacao" placeholder="Ex: cliente prefere franja mais longa">
  </div>
  <button type="submit" class="btn">Salvar agendamento</button>
</form>
{% endblock %}
