{% extends 'base.html' %}
{% block title %}{% if servico %}Editar Serviço{% else %}Novo Serviço{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
  <h2>{% if servico %}Editar Serviço{% else %}Novo Serviço{% endif %}</h2>
  <a href="{{ url_for('servicos') }}" class="btn-sec">← Voltar</a>
</div>

<form method="post" class="form-card">
  <div class="field">
    <label>Nome do serviço</label>
    <input type="text" name="nome" value="{{ servico.nome if servico else '' }}" required autofocus>
  </div>
  <div class="row2">
    <div class="field">
      <label>Duração (minutos)</label>
      <input type="number" name="duracao_min" value="{{ servico.duracao_min if servico else 30 }}" min="5" required>
    </div>
    <div class="field">
      <label>Preço (R$)</label>
      <input type="number" name="preco" value="{{ servico.preco if servico else '' }}" step="0.01" min="0" required>
    </div>
  </div>
  <button type="submit" class="btn">Salvar</button>
</form>
{% endblock %}
