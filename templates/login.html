{% extends 'base.html' %}
{% block title %}Login — AgendaPro{% endblock %}
{% block content %}
<div class="login-box">
  <h1>✂ AgendaPro</h1>
  <p class="sub">Sistema de agendamento</p>
  {% with msgs = get_flashed_messages() %}
    {% if msgs %}<div class="flash">{{ msgs[0] }}</div>{% endif %}
  {% endwith %}
  <form method="post">
    <label>Usuário</label>
    <input type="text" name="usuario" placeholder="admin" required autofocus>
    <label>Senha</label>
    <input type="password" name="senha" placeholder="••••••••" required>
    <button type="submit">Entrar</button>
  </form>
  <p class="hint">Padrão: admin / admin123</p>
</div>
{% endblock %}
